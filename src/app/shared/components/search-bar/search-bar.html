<!-- SEARCH BAR -->
<div class="hidden lg:flex items-center border border-gray-300 h-[44px]">
  <input
    #searchInput
    type="text"
    placeholder="Search products..."
    class="h-full w-[220px] px-4 outline-none text-sm"
  />

  <app-button
    (click)="onSearch(searchInput.value)"

  >
    Search
  </app-button>
</div>
