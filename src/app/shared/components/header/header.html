
<!-- HEADER -->
<header class="w-full border-b border-[#E5E5E5] bg-white">

  <div
    class="max-w-[1440px] mx-auto h-[82px] px-6 lg:px-14 flex items-center justify-between"
  >

    <!-- LOGO -->
    <div
      class="flex items-center gap-3 cursor-pointer shrink-0"
      routerLink="/home"
    >
      <div
        class="w-11 h-11 rounded-full border border-[#2D2A32] flex items-center justify-center"
      >
        <span class="text-sm font-medium text-[#2D2A32]">
          S
        </span>
      </div>

      <h1
        class="text-[38px] font-medium tracking-[-1px] text-[#2D2A32]"
      >
        ShopFront
      </h1>
    </div>

    <!-- NAVIGATION -->
    <nav class="hidden md:flex items-center gap-12">

      @for (item of navItems; track item.path) {

        <a
          [routerLink]="item.path"
          routerLinkActive="text-black"
          class="text-[13px] uppercase tracking-[2px] text-[#6B6B6B] hover:text-black transition duration-300 font-medium"
        >
          {{ item.label }}
        </a>

      }

    </nav>

    <!-- RIGHT SIDE -->
    <div class="flex items-center gap-4">

      <!-- SEARCH -->
      <app-search-bar
        (searchChange)="handleSearch($event)"
      />

      @if (!isAuthenticated()) {

        <a
          routerLink="/login"

        >
              <app-button>Login</app-button>
        </a>


      } @else {

        <a
          routerLink="/profile"

        >
          <app-button>Profile</app-button>
        </a>

        <app-button
       
          (click)="logout()"
        >
          Logout
        </app-button>

      }

      <!-- CART -->
      <app-button>
        Cart
      </app-button>

    </div>

  </div>
