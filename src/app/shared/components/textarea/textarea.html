<div class="field">
  @if (label) {
    <label class="field__label" for="textarea-field">
      {{ label }}
      @if (required) {
        <span class="field__required">*</span>
      }
    </label>
  }

  <textarea
    id="textarea-field"
    [placeholder]="placeholder"
    [rows]="rows"
    [disabled]="isDisabled"
    class="field__textarea"
    [ngClass]="{ 'field__textarea--error': error }"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
    >{{ value }}</textarea
  >

  @if (error) {
    <span class="field__error">{{ error }}</span>
  }
</div>
