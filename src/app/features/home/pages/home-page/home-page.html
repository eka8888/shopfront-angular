<!-- HOME PAGE -->
<div class="mx-auto min-h-screen max-w-360 bg-white px-6 py-12 lg:px-20">
  <!-- HERO -->
  <app-hero-section />

  <!-- CATEGORIES -->
  <app-categories-section />

  <!-- PRODUCTS -->
  <div class="mb-12">
    <h2 class="text-3xl font-semibold tracking-wide text-[#2D2A32] uppercase">Featured Products</h2>

    <div class="mt-4 h-[2px] w-24 bg-[#2D2A32]"></div>
  </div>

  <div class="grid grid-cols-1 gap-10 sm:grid-cols-2 lg:grid-cols-4">
    @for (product of products; track product.id) {
    <app-product-card
      [product]="product"
      (addToCart)="handleAddToCart($event)" />
    }
  </div>
</div>
