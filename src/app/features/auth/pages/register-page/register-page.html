<div class="min-h-screen flex items-center justify-center bg-[#F6F6F6]">
  <div class="bg-white p-10 w-[400px] shadow-md">
    <h1 class="text-3xl font-semibold mb-8 text-center">
      Register
    </h1>

    <form
      class="flex flex-col gap-5"
      (ngSubmit)="register()"
    >
      <app-input
        [type]="InputType.Text"
        placeholder="Full name"
      />

      <app-input
        [type]="InputType.Email"
        placeholder="Email"
      />

      <app-input
        [type]="InputType.Password"
        placeholder="Password"
      />

      <app-button
        [type]="ButtonType.Submit"
        [fullWidth]="true"
  
      >
        Register
      </app-button>
    </form>
  </div>
</div>
