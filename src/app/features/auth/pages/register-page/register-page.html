<div class="min-h-screen flex items-center justify-center bg-[#F6F6F6]">
  <div class="bg-white p-10 w-[400px] shadow-md">
    <h1 class="text-3xl font-semibold mb-8 text-center">
      Register
    </h1>

    <div class="flex flex-col gap-5">
      <input
        type="text"
        placeholder="Full name"
        class="border border-gray-300 p-3 outline-none"
      />

      <input
        type="email"
        placeholder="Email"
        class="border border-gray-300 p-3 outline-none"
      />

      <input
        type="password"
        placeholder="Password"
        class="border border-gray-300 p-3 outline-none"
      />

      <button
        (click)="register()"
        class="bg-black text-white py-3 uppercase tracking-widest hover:opacity-90 transition"
      >
        Register
      </button>
    </div>
  </div>
</div>
