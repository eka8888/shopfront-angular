<div class="min-h-screen flex items-center justify-center bg-[#F6F6F6]">
  <div class="bg-white p-10 w-[400px] shadow-md">
    <h1 class="text-3xl font-semibold mb-8 text-center">
      Login
    </h1>

    <div class="flex flex-col gap-5">
      <input
        type="email"
        placeholder="Email"
        class="border border-gray-300 p-3 outline-none"
      />

      <input
        type="password"
        placeholder="Password"
        class="border border-gray-300 p-3 outline-none"
      />

      <app-button
        (click)="login()"

      >
        Login
      </app-button>
    </div>
  </div>
</div>
